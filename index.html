<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🎉</title>
<style>
  :root{
    --gold:#e8c77e;
    --gold-soft:#d9b676;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%;
    background:
      radial-gradient(circle at 50% 0%, #ffffff 0%, #f4f2ee 70%);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    position:relative;
  }

  .frame{
    position:relative;
    width:100%;
    max-width:480px;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:6vh 6vw;
  }

  .rule{
    width:36px; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0;
    animation: fadeIn 1s ease forwards;
    animation-delay:.2s;
    margin-bottom:5vh;
  }

  .rebus{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4.5vw;
    white-space:nowrap;
  }

  .rebus span{
    display:inline-block;
    font-size:13vw;
    opacity:0;
    transform:translateY(18px) scale(.92);
    animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards;
    filter:drop-shadow(0 0 0 rgba(232,199,126,0));
  }
  .rebus span:nth-child(1){ animation-delay:.35s; }
  .rebus span:nth-child(2){ animation-delay:.55s; }
  .rebus span:nth-child(3){ animation-delay:.75s; }
  .rebus span:nth-child(4){ animation-delay:.95s; }

  @keyframes rise{
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .rebus.settled span{
    opacity:1;
    transform:none;
    animation: glowPulse 3.6s ease-in-out infinite;
  }
  .rebus.settled span:nth-child(1){ animation-delay:0s; }
  .rebus.settled span:nth-child(2){ animation-delay:.3s; }
  .rebus.settled span:nth-child(3){ animation-delay:.6s; }
  .rebus.settled span:nth-child(4){ animation-delay:.9s; }

  @keyframes glowPulse{
    0%,100%{ filter:drop-shadow(0 0 2px rgba(232,199,126,0.05)); transform:translateY(0); }
    50%{ filter:drop-shadow(0 0 16px rgba(232,199,126,0.35)); transform:translateY(-3px); }
  }

  .rule2{
    width:36px; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0;
    animation: fadeIn 1s ease forwards;
    animation-delay:1.3s;
    margin-top:5vh;
  }

  @keyframes fadeIn{ to{ opacity:.7; } }


  .bgvideo{
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
    opacity:0;
    animation: fadeInVideo 1s ease forwards;
    animation-delay:.1s;
  }
  @keyframes fadeInVideo{ to{ opacity:1; } }

  .overlay{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(0,0,0,.42) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 65%, rgba(0,0,0,.5) 100%);
  }

canvas#confetti{
    position:fixed; inset:0; z-index:2; pointer-events:none;
  }

  .frame > *{ position:relative; z-index:3; }
</style>
</head>
<body>
  <video class="bgvideo" id="bgvideo" autoplay muted loop playsinline webkit-playsinline></video>
  <div class="overlay"></div>
  <canvas id="confetti"></canvas>
  <div class="frame">
    <div class="rule"></div>
    <div class="rebus" id="rebus">
      <span>🩸</span><span>💨</span><span>🅿️</span><span>🏹</span>
    </div>
    <div class="rule2"></div>
  </div>

<script>
  // reveal glow state once entrance animation finishes
  setTimeout(() => document.getElementById('rebus').classList.add('settled'), 1300);

  // elegant confetti — gold / white / silver, sparse and light
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const colors = ['#e8c77e', '#1a1a1a', '#b0a89c', '#d9b676'];
  const pieces = Array.from({length:70}, () => ({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.6,
    w: 4 + Math.random()*5,
    h: 8 + Math.random()*6,
    speed: 1.4 + Math.random()*2.2,
    drift: (Math.random()-0.5)*1.4,
    rot: Math.random()*360,
    rotSpeed: (Math.random()-0.5)*6,
    color: colors[Math.floor(Math.random()*colors.length)],
    opacity: 0.55 + Math.random()*0.45
  }));

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.rot += p.rotSpeed;
      if (p.y > canvas.height + 20){
        p.y = -20;
        p.x = Math.random()*canvas.width;
      }
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    requestAnimationFrame(animate);
  }
  animate();
</script>
